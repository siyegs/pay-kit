name: Publish

# Publishes to npm automatically when a GitHub Release is published, so you never
# have to run `npm login` / `npm publish` by hand again. Uses npm Trusted
# Publishing (OIDC) - no npm token needed once configured (see README/CONTRIBUTING).
#
# One-time setup on npmjs.com: package Settings -> "Trusted Publisher" -> add this
# repo (siyegs/pay-kit) and workflow (publish.yml). Then cut a GitHub Release whose
# tag matches package.json's version (e.g. v0.9.0).

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for provenance + trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify (typecheck, test, build)
        run: |
          bun run typecheck
          bun test
          bun run build

      - name: Set up Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Use latest npm (trusted publishing support)
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --provenance --access public
